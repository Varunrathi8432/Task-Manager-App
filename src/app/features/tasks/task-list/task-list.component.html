<div class="task-list-container">
  <app-page-header
    title="Tasks"
    [subtitle]="taskStore.totalCount() + ' total tasks, ' + taskStore.completedCount() + ' completed'">
  </app-page-header>

  <app-dynamic-filter
    [fieldsArray]="filterFields()"
    (whenFilterSubmit)="onFilterSubmit($event)">
  </app-dynamic-filter>

  @if (selectedTasks().length > 0) {
    <div class="bulk-actions">
      <span class="bulk-count">{{ selectedTasks().length }} selected</span>

      <button mat-flat-button color="warn" (click)="bulkDelete()">
        <mat-icon>delete</mat-icon>
        Delete
      </button>

      <button mat-flat-button [matMenuTriggerFor]="statusMenu">
        <mat-icon>swap_horiz</mat-icon>
        Change Status
      </button>
      <mat-menu #statusMenu="matMenu">
        <button mat-menu-item (click)="bulkStatusChange('todo')">To Do</button>
        <button mat-menu-item (click)="bulkStatusChange('in-progress')">In Progress</button>
        <button mat-menu-item (click)="bulkStatusChange('review')">Review</button>
        <button mat-menu-item (click)="bulkStatusChange('done')">Done</button>
      </mat-menu>

      <button mat-icon-button (click)="clearSelection()" matTooltip="Clear selection">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  }

  <app-custom-table
    [customColumnList]="customColumnList"
    [tableData]="tableData()"
    [context]="context"
    rowSelection="multiple"
    [paginationPageSize]="10"
    [showEditButton]="true"
    [showDeleteButton]="true"
    noDataMessage="No tasks found. Try adjusting filters or create a new task."
    (gridReady)="onGridReady($event)"
    (onRowSelect)="onRowSelect($event)"
    (rowClicked)="onRowClicked($event)">
  </app-custom-table>

  <button
    mat-fab
    color="primary"
    class="fab-button"
    matTooltip="Create new task"
    (click)="openTaskForm()">
    <mat-icon>add</mat-icon>
  </button>
</div>
