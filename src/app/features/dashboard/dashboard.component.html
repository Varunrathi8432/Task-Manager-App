<div class="dashboard-container page-container">
  <app-page-header title="Dashboard" subtitle="Welcome back! Here's an overview of your tasks." />

  <div class="dashboard-body page-scroll-body">
    <app-stats-cards />

    <div class="dashboard-grid">
      <div class="grid-item chart-area">
        <app-productivity-chart />
      </div>
      <div class="grid-item deadlines-area">
        <app-upcoming-deadlines />
      </div>
      <div class="grid-item quick-add-area">
        <app-quick-add />
      </div>
      <div class="grid-item quote-area">
        <app-quote-widget />
      </div>
    </div>
  </div>
</div>
