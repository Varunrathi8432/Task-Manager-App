<div class="modal-header">
  <h4 class="modal-title">{{ isEditing ? 'Edit Project' : 'New Project' }}</h4>
  <button type="button" class="close" aria-label="Close" (click)="onCancel()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div class="modal-body">
  <form [formGroup]="form" class="project-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Project Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter project name" />
      @if (form.controls.name.hasError('required') && form.controls.name.touched) {
        <mat-error>Project name is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea
        matInput
        formControlName="description"
        placeholder="Enter project description"
        rows="3"
      ></textarea>
    </mat-form-field>

    <div class="color-picker">
      <label class="color-label">Project Color</label>
      <div class="color-swatches">
        @for (color of colors; track color) {
          <button
            type="button"
            class="color-swatch"
            [style.background-color]="color"
            [class.selected]="form.value.color === color"
            (click)="selectColor(color)"
          >
            @if (form.value.color === color) {
              <span class="check-mark">&#10003;</span>
            }
          </button>
        }
      </div>
    </div>
  </form>
</div>

<div class="modal-footer">
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="form.invalid" (click)="onSave()">
    {{ isEditing ? 'Update' : 'Create' }}
  </button>
</div>
