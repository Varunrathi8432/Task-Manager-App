<div class="calendar-container">
  <app-page-header title="Calendar" [subtitle]="subtitle()"></app-page-header>

  <app-dynamic-filter
    [fieldsArray]="filterFields()"
    [filterFormData]="filterFormData()"
    (whenFilterSubmit)="onFilterSubmit($event)">
  </app-dynamic-filter>

  <div class="calendar-wrapper">
    <full-calendar [options]="calendarOptions()"></full-calendar>
  </div>
</div>
