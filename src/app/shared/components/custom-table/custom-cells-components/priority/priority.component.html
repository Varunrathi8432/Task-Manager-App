@if (hasValue()) {
  @if (knownKey(); as key) {
    <span class="table-priority" [class]="'table-priority priority-' + key" [title]="label()">
      {{ label() }}
    </span>
  } @else {
    <span
      class="table-priority"
      [style.background]="background()"
      [style.color]="color()"
      [title]="label()">
      {{ label() }}
    </span>
  }
} @else {
  <span class="empty">—</span>
}
