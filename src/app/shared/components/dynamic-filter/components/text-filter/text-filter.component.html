<button
  type="button"
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  class="filter-overlay-button"
  [class.active]="isOpen()"
  [class.filter-applied]="selectedLength() > 0"
  (click)="toggle()">
  <span class="control-label">
    <span class="txt">{{ field.label }}</span>
    @if (selectedLength() > 0) {
      <span class="filter-count">{{ selectedLength() }}</span>
    }
  </span>
  <mat-icon class="chevron" [class.open]="isOpen()">expand_more</mat-icon>
</button>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  cdkConnectedOverlayPanelClass="filter-overlay-panel"
  (overlayOutsideClick)="close()"
  (backdropClick)="close()">
  <div class="filter-popover" [formGroup]="group">
    <div class="filter-info">
      <span class="filter-clear" (click)="onClear()" matTooltip="Clear selection">
        <mat-icon>close</mat-icon>Clear
      </span>
    </div>
    <div class="filter-body">
      <input
        type="text"
        class="form-control"
        [placeholder]="field.placeholder ?? field.label"
        [formControlName]="field.name"
        autofocus />
    </div>
  </div>
</ng-template>
