name: Firebase Hosting PR Preview

on:
  pull_request:
    branches:
      - main

jobs:
  preview:
    name: Build & Preview
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck -p tsconfig.app.json

      - name: Build (production)
        run: npm run build:prod

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TASK_MANAGER_APP_8E35C }}
          projectId: task-manager-app-8e35c
          # channelId is omitted → auto-generates a unique preview URL per PR
          # Preview channels expire after 7 days automatically
          expires: 7d
